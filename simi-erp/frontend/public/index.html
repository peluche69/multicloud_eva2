<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ERP Farmacias SIMI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f2f5; }

    header {
      background: #1a5276;
      color: white;
      padding: 1rem 2rem;
    }
    header h1 { font-size: 1.4rem; }
    header p { font-size: 0.85rem; opacity: 0.8; }

    .container { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; }

    .card {
      background: white;
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      border: 1px solid #ddd;
    }
    .card h2 {
      font-size: 1rem;
      color: #1a5276;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #eee;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 0.75rem;
    }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    label { font-size: 13px; color: #555; }
    input, select {
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    .btn {
      background: #1a5276;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      margin-top: 1rem;
    }
    .btn:hover { background: #154360; }
    .btn-danger {
      background: #c0392b;
      font-size: 12px;
      padding: 5px 10px;
      margin-top: 0;
    }

    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th {
      background: #f8f9fa;
      padding: 10px 12px;
      text-align: left;
      font-size: 12px;
      color: #666;
      border-bottom: 2px solid #eee;
    }
    td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; }

    #msg {
      padding: 10px;
      border-radius: 6px;
      margin-top: 0.75rem;
      font-size: 13px;
      display: none;
    }
    .msg-ok { background: #d5f5e3; color: #1e8449; }
    .msg-err { background: #fadbd8; color: #c0392b; }
  </style>
</head>
<body>

<header>
  <h1>Farmacias SIMI — Sistema ERP</h1>
  <p>Gestion de Productos e Inventario</p>
</header>

<div class="container">

  <div class="card">
    <h2>Registrar nuevo producto</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>Nombre *</label>
        <input type="text" id="nombre" placeholder="Ej: Paracetamol 500mg" />
      </div>
      <div class="form-group">
        <label>Categoria</label>
        <select id="categoria">
          <option value="">Seleccionar...</option>
          <option>Analgesicos</option>
          <option>Antibioticos</option>
          <option>Antiinflamatorios</option>
          <option>Vitaminas</option>
          <option>Cuidado personal</option>
          <option>Otro</option>
        </select>
      </div>
      <div class="form-group">
        <label>Precio (CLP) *</label>
        <input type="number" id="precio" placeholder="0" min="0" />
      </div>
      <div class="form-group">
        <label>Stock *</label>
        <input type="number" id="stock" placeholder="0" min="0" />
      </div>
      <div class="form-group" style="grid-column: 1 / -1;">
        <label>Descripcion</label>
        <input type="text" id="descripcion" placeholder="Descripcion breve" />
      </div>
    </div>
    <button class="btn" onclick="agregarProducto()">Guardar producto</button>
    <div id="msg"></div>
  </div>

  <div class="card">
    <h2>Listado de productos</h2>
    <div id="loading" style="text-align:center;padding:2rem;color:#888;">
      Cargando productos...
    </div>
    <table id="tabla" style="display:none;">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Categoria</th>
          <th>Precio</th>
          <th>Stock</th>
          <th>Descripcion</th>
          <th>Accion</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

</div>

<script>
  const API = '/api/productos';

  async function cargarProductos() {
    try {
      const res = await fetch(API);
      const productos = await res.json();
      const tbody = document.getElementById('tbody');
      tbody.innerHTML = '';

      if (productos.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#aaa;padding:2rem;">No hay productos registrados.</td></tr>';
      } else {
        productos.forEach(p => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${p.id}</td>
            <td><strong>${p.nombre}</strong></td>
            <td>${p.categoria || '—'}</td>
            <td>$${Number(p.precio).toLocaleString('es-CL')}</td>
            <td>${p.stock}</td>
            <td style="color:#666;">${p.descripcion || '—'}</td>
            <td>
              <button class="btn btn-danger" onclick="eliminar(${p.id})">
                Eliminar
              </button>
            </td>
          `;
          tbody.appendChild(tr);
        });
      }

      document.getElementById('loading').style.display = 'none';
      document.getElementById('tabla').style.display = 'table';

    } catch (e) {
      document.getElementById('loading').textContent =
        'Error al conectar con el servidor.';
    }
  }

  async function agregarProducto() {
    const nombre     = document.getElementById('nombre').value.trim();
    const precio     = document.getElementById('precio').value;
    const stock      = document.getElementById('stock').value;
    const descripcion = document.getElementById('descripcion').value.trim();
    const categoria  = document.getElementById('categoria').value;
    const msg        = document.getElementById('msg');

    if (!nombre || !precio || !stock) {
      msg.textContent = 'Completa los campos obligatorios (*)';
      msg.className = 'msg-err';
      msg.style.display = 'block';
      return;
    }

    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          nombre,
          descripcion,
          precio: parseFloat(precio),
          stock: parseInt(stock),
          categoria
        })
      });

      if (res.ok) {
        msg.textContent = 'Producto guardado correctamente.';
        msg.className = 'msg-ok';
        msg.style.display = 'block';
        document.getElementById('nombre').value = '';
        document.getElementById('precio').value = '';
        document.getElementById('stock').value = '';
        document.getElementById('descripcion').value = '';
        document.getElementById('categoria').value = '';
        cargarProductos();
        setTimeout(() => msg.style.display = 'none', 3000);
      } else {
        msg.textContent = 'Error al guardar el producto.';
        msg.className = 'msg-err';
        msg.style.display = 'block';
      }
    } catch (e) {
      msg.textContent = 'No se pudo conectar con la API.';
      msg.className = 'msg-err';
      msg.style.display = 'block';
    }
  }

  async function eliminar(id) {
    if (!confirm('¿Eliminar este producto?')) return;
    await fetch(`${API}/${id}`, { method: 'DELETE' });
    cargarProductos();
  }

  cargarProductos();
</script>

</body>
</html>
